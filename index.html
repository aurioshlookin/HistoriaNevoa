<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>História da Vila Oculta da Névoa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js para interpretar o Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #cbd5e1; /* Slate 300 */
        }
        
        .mist-gradient {
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }

        /* Estilos do Markdown Gerado */
        .prose h1 {
            color: #f8fafc;
            font-size: 2rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            scroll-margin-top: 100px; /* Evita que o cabeçalho fixo cubra o titulo ao navegar */
        }
        .prose h2 {
            color: #e0f2fe;
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            scroll-margin-top: 100px;
        }
        .prose p {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }
        .prose blockquote {
            border-left: 4px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            padding: 0.75rem 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
            margin-bottom: 1.25rem;
            color: #94a3b8;
            font-style: italic;
        }
        .prose a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }
        .prose a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        .prose strong {
            color: #f1f5f9;
            font-weight: 600;
        }
        
        /* Menu Lateral Customizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="mist-gradient h-screen overflow-hidden flex flex-col">

    <!-- Header / Navbar Superior -->
    <header class="bg-slate-900/90 backdrop-blur-md z-40 border-b border-slate-800 shadow-md flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl md:text-2xl font-bold text-blue-100 flex items-center gap-2">
                <span class="text-2xl">🌫️</span> Arquivos da Névoa
            </h1>
            
            <!-- Botão Menu Mobile -->
            <button id="menu-toggle" class="md:hidden text-slate-300 hover:text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Layout Principal: Menu Lateral (Esquerda) e Conteúdo (Direita) -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Menu Lateral (Índice) -->
        <aside id="sidebar" class="w-72 bg-slate-900/80 border-r border-slate-800 flex-shrink-0 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-30 h-full">
            <div class="p-4 border-b border-slate-800">
                <h3 class="text-lg font-bold text-slate-200">📖 Índice</h3>
            </div>
            <!-- Lista do Índice -->
            <nav class="flex-1 overflow-y-auto p-4">
                <ul id="toc-list" class="space-y-1">
                    <!-- O índice será gerado via JS -->
                </ul>
            </nav>
        </aside>

        <!-- Overlay fundo escuro (para mobile quando o menu está aberto) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

        <!-- Área de Conteúdo -->
        <main class="flex-1 overflow-y-auto relative scroll-smooth" id="main-scroll-area">
            <div class="max-w-4xl mx-auto px-4 py-8" id="content-container">
                <!-- Loader -->
                <div id="loading" class="text-center text-slate-400 py-20 flex flex-col items-center">
                    <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Buscando os registros da Névoa em dados.json...
                </div>
            </div>

            <!-- Footer interno -->
            <footer class="text-center py-6 text-slate-500 text-sm mt-12 border-t border-slate-800/50">
                <p>Registros históricos da Vila Oculta da Névoa compilados por Auriosh.</p>
            </footer>
        </main>
    </div>

    <!-- Fallback caso não consiga buscar de dados.json (usado para ambientes de preview online) -->
    <script id="fallback-json" type="application/json">
        [] 
    </script>

    <script>
        // Configurando o Marked.js
        marked.setOptions({ breaks: true, gfm: true });
        
        // Elementos UI
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-toggle');
        const contentContainer = document.getElementById('content-container');
        const tocList = document.getElementById('toc-list');
        const loading = document.getElementById('loading');
        
        // Controle do Menu Mobile
        function toggleMenu() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
        
        // Função para criar uma ID amigável (slug)
        function createSlug(text) {
            return text.replace(/<[^>]*>?/gm, '') // Remove HTML
                       .replace(/\*\*/g, '')      // Remove asteriscos do markdown
                       .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
                       .replace(/[^\w\s-]/g, '')  // Remove caracteres especiais
                       .trim().toLowerCase().replace(/\s+/g, '-');
        }

        // 1. Carregar os Dados do arquivo JSON externo
        async function fetchDados() {
            try {
                // Tenta carregar o arquivo externo que foi gerado junto
                const response = await fetch('dados.json');
                if (!response.ok) throw new Error("Não foi possível acessar dados.json");
                const data = await response.json();
                processarDados(data);
            } catch (error) {
                console.error("Erro ao tentar buscar o dados.json externo.", error);
                loading.innerHTML = `
                    <div class="text-red-400 p-6 border border-red-500/30 rounded-xl bg-red-900/10">
                        <h2 class="font-bold text-lg mb-2">Erro de conexão com dados.json</h2>
                        <p class="text-sm">Se você estiver executando isso localmente (direto no navegador), ele pode bloquear o arquivo devido à política de CORS.<br> 
                        Recomendação: Abra o <b>index.html</b> usando uma extensão como o <i>Live Server</i> do VSCode ou coloque-o em um pequeno servidor web.</p>
                    </div>`;
            }
        }

        // 2. Renderizar os dados e extrair informações para o Índice
        function processarDados(rawData) {
            loading.style.display = 'none'; // Esconder loader
            
            // Ordenar do mais antigo para o mais novo
            const sortedData = rawData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            const discordEmojiRegex = /<:([a-zA-Z0-9_]+):(\d+)>/g;
            let tocHTML = '';

            // Agrupar mensagens pelo cabeçalho (# ou ##)
            const groupedData = [];
            let currentGroup = null;

            sortedData.forEach(msg => {
                // Verifica se a mensagem contém um título principal (# ou ##)
                const hasHeading = /^(#{1,2})\s+(.*)$/m.test(msg.content || "");
                
                if (hasHeading || !currentGroup) {
                    // Cria um novo balão
                    currentGroup = {
                        author: msg.author,
                        timestamp: msg.timestamp,
                        content: msg.content || "",
                        attachments: [...(msg.attachments || [])],
                        embeds: [...(msg.embeds || [])]
                    };
                    groupedData.push(currentGroup);
                } else {
                    // Adiciona conteúdo ao balão atual
                    if (msg.content) currentGroup.content += '\n\n' + msg.content;
                    if (msg.attachments) currentGroup.attachments.push(...msg.attachments);
                    if (msg.embeds) currentGroup.embeds.push(...msg.embeds);
                }
            });

            groupedData.forEach((group) => {
                let rawContent = group.content || "";
                
                // Extração dos Títulos para o Índice e injeção de Âncoras
                const lines = rawContent.split('\n');
                lines.forEach(line => {
                    const match = line.match(/^(#{1,2})\s+(.*)$/); // Pega linhas com # ou ##
                    if (match) {
                        const level = match[1].length; 
                        let text = match[2];
                        
                        // ID Baseado no texto limpo
                        const slug = createSlug(text);
                        
                        // Substitui Emojis do Discord apenas para o nome que vai aparecer no índice
                        let tocText = text.replace(/\*\*/g, '') // remove markdown bold pro indice
                                          .replace(discordEmojiRegex, '<img src="https://cdn.discordapp.com/emojis/$2.png" class="inline-block w-4 h-4 mr-1 align-middle">');
                        
                        // Injeta uma âncora de ID direto no markdown para a navegação funcionar
                        rawContent = rawContent.replace(line, `<div id="${slug}"></div>\n${line}`);
                        
                        // Adiciona no HTML do Índice
                        if (level === 1) {
                            tocHTML += `<li class="pt-3 pb-1"><a href="#${slug}" class="block text-blue-200 font-bold hover:text-blue-400 transition-colors text-sm" onclick="if(window.innerWidth < 768) toggleMenu()">${tocText}</a></li>`;
                        } else if (level === 2) {
                            tocHTML += `<li class="ml-3 border-l-2 border-slate-700/50 pl-3 py-1"><a href="#${slug}" class="block text-slate-400 text-sm hover:text-blue-300 transition-colors" onclick="if(window.innerWidth < 768) toggleMenu()">${tocText}</a></li>`;
                        }
                    }
                });

                // Substituir emojis do discord no corpo da mensagem
                rawContent = rawContent.replace(discordEmojiRegex, '<img src="https://cdn.discordapp.com/emojis/$2.png" alt=":$1:" class="inline-block h-6 w-6 align-middle">');
                
                // Fazer parse do Markdown para HTML
                let htmlContent = marked.parse(rawContent);

                // Criar Bloco Visual do Artigo
                const article = document.createElement('article');
                article.className = 'mb-10 bg-slate-800/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-slate-700/50 hover:border-slate-600 transition-colors';

                // Cabeçalho (Autor, Avatar, Data)
                const dateObj = new Date(group.timestamp);
                const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                const avatarUrl = group.author.avatar 
                    ? `https://cdn.discordapp.com/avatars/${group.author.id}/${group.author.avatar}.png` 
                    : `https://cdn.discordapp.com/embed/avatars/${parseInt(group.author.discriminator || 0) % 5}.png`;
                const displayName = group.author.global_name || group.author.username;

                let headerHTML = `
                    <div class="flex items-center mb-5 pb-4 border-b border-slate-700/50">
                        <img src="${avatarUrl}" class="w-12 h-12 rounded-full mr-4 shadow-sm" alt="${displayName}">
                        <div>
                            <div class="font-bold text-blue-300 text-lg leading-tight">${displayName}</div>
                            <div class="text-xs text-slate-400 mt-1">${dateStr}</div>
                        </div>
                    </div>
                `;

                // Anexos de Imagens
                let attachmentsHTML = '';
                if (group.attachments && group.attachments.length > 0) {
                    attachmentsHTML = '<div class="mt-6 flex flex-col gap-4">';
                    group.attachments.forEach(att => {
                        if (att.content_type && att.content_type.startsWith('image/')) {
                            attachmentsHTML += `
                            <div class="rounded-xl overflow-hidden shadow-lg border border-slate-700/50 bg-slate-900/50">
                                <img src="${att.url}" alt="${att.filename}" class="w-full h-auto object-contain max-h-[600px] hover:scale-[1.02] transition-transform duration-300" loading="lazy">
                            </div>`;
                        }
                    });
                    attachmentsHTML += '</div>';
                }

                // Iframes do YouTube
                let embedsHTML = '';
                if (group.embeds && group.embeds.length > 0) {
                    embedsHTML = '<div class="mt-6 flex flex-col gap-4">';
                    group.embeds.forEach(embed => {
                        if (embed.type === 'video' && embed.video && embed.video.url) {
                            embedsHTML += `
                                <div class="rounded-xl overflow-hidden shadow-lg border border-slate-700/50 bg-slate-900/50 p-2">
                                    <div class="relative w-full pb-[56.25%] h-0 rounded-lg overflow-hidden">
                                        <iframe src="${embed.video.url}" class="absolute top-0 left-0 w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                    </div>
                                    ${embed.title ? `<p class="mt-2 text-sm text-slate-400 font-semibold text-center">${embed.title}</p>` : ''}
                                </div>
                            `;
                        }
                    });
                    embedsHTML += '</div>';
                }

                // Unir tudo
                article.innerHTML = headerHTML + `<div class="prose max-w-none">${htmlContent}</div>` + attachmentsHTML + embedsHTML;
                contentContainer.appendChild(article);
            });

            // Atualizar o container do índice
            tocList.innerHTML = tocHTML;
        }

        // Inicia
        fetchDados();
    </script>
</body>
</html>
