<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>História da Vila Oculta da Névoa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js para interpretar o Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #cbd5e1; /* Slate 300 */
        }
        
        .mist-gradient {
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }

        /* Estilos do Markdown Geral (Fora da caixa de mídia) */
        .prose p {
            margin-bottom: 1.25rem;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #e2e8f0;
        }
        .prose blockquote {
            border-left: 4px solid #3b82f6;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            padding: 1rem 1.25rem;
            border-radius: 0 0.5rem 0.5rem 0;
            margin-bottom: 1.5rem;
            color: #94a3b8;
            font-style: italic;
        }
        .prose blockquote p {
            margin-bottom: 0;
        }
        .prose a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }
        .prose a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        .prose strong {
            color: #ffffff;
            font-weight: 700;
        }

        /* Estilo específico para textos que são legendas de imagens (Dentro da caixa) */
        .media-caption p {
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }
        .media-caption p:last-child {
            margin-bottom: 0;
        }
        .media-caption blockquote {
            border-left: 3px solid #64748b; /* Estilo sutil de citação do Discord */
            background: transparent;
            padding: 0 0 0 1rem;
            margin: 0 0 1rem 0;
            color: #cbd5e1;
            font-style: italic;
            border-radius: 0;
        }
        
        /* Menu Lateral Customizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="mist-gradient h-screen overflow-hidden flex flex-col">

    <!-- Header / Navbar Superior -->
    <header class="bg-slate-900/90 backdrop-blur-md z-40 border-b border-slate-800 shadow-md flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl md:text-2xl font-bold text-blue-100 flex items-center gap-2">
                <span class="text-2xl">🌫️</span> Arquivos da Névoa
            </h1>
            
            <!-- Botão Menu Mobile -->
            <button id="menu-toggle" class="md:hidden text-slate-300 hover:text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Layout Principal: Menu Lateral (Esquerda) e Conteúdo (Direita) -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Menu Lateral (Índice) -->
        <aside id="sidebar" class="w-72 bg-slate-900/80 border-r border-slate-800 flex-shrink-0 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-30 h-full">
            <div class="p-4 border-b border-slate-800">
                <h3 class="text-lg font-bold text-slate-200">📖 Índice</h3>
            </div>
            <!-- Lista do Índice -->
            <nav class="flex-1 overflow-y-auto p-4">
                <ul id="toc-list" class="space-y-1">
                    <!-- O índice será gerado via JS -->
                </ul>
            </nav>
        </aside>

        <!-- Overlay fundo escuro (para mobile quando o menu está aberto) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

        <!-- Área de Conteúdo -->
        <main class="flex-1 overflow-y-auto relative scroll-smooth" id="main-scroll-area">
            <div class="max-w-4xl mx-auto px-4 py-8" id="content-container">
                <!-- Loader -->
                <div id="loading" class="text-center text-slate-400 py-20 flex flex-col items-center">
                    <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Buscando os registros da Névoa em dados.json...
                </div>
            </div>

            <!-- Footer interno -->
            <footer class="text-center py-8 text-slate-500 text-sm mt-12 border-t border-slate-800/50">
                <p>Registros históricos da Vila Oculta da Névoa compilados por Auriosh.</p>
            </footer>
        </main>
    </div>

    <script>
        // Configurando o Marked.js para não adicionar IDs automáticos conflitantes
        marked.setOptions({ breaks: true, gfm: true });
        
        // Elementos UI
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-toggle');
        const contentContainer = document.getElementById('content-container');
        const tocList = document.getElementById('toc-list');
        const loading = document.getElementById('loading');
        
        // Controle do Menu Mobile
        function toggleMenu() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
        
        // Função para criar uma ID amigável (slug)
        function createSlug(text) {
            return text.replace(/<[^>]*>?/gm, '') // Remove HTML
                       .replace(/\*\*/g, '')      // Remove asteriscos do markdown
                       .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
                       .replace(/[^\w\s-]/g, '')  // Remove caracteres especiais
                       .trim().toLowerCase().replace(/\s+/g, '-');
        }

        // 1. Carregar os Dados do arquivo JSON externo
        async function fetchDados() {
            try {
                const response = await fetch('dados.json');
                if (!response.ok) throw new Error("Não foi possível acessar dados.json");
                const data = await response.json();
                processarDados(data);
            } catch (error) {
                console.error("Erro ao tentar buscar o dados.json externo.", error);
                loading.innerHTML = `
                    <div class="text-red-400 p-6 border border-red-500/30 rounded-xl bg-red-900/10">
                        <h2 class="font-bold text-lg mb-2">Erro de conexão com dados.json</h2>
                        <p class="text-sm">Se você estiver executando isso localmente (direto no navegador), ele pode bloquear o arquivo devido à política de CORS.<br> 
                        Recomendação: Abra o <b>index.html</b> usando uma extensão como o <i>Live Server</i> do VSCode ou coloque-o em um pequeno servidor web.</p>
                    </div>`;
            }
        }

        // 2. Renderizar os dados e extrair informações para o Índice
        function processarDados(rawData) {
            loading.style.display = 'none'; // Esconder loader
            
            // Ordenar do mais antigo para o mais novo
            const sortedData = rawData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const discordEmojiRegex = /<:([a-zA-Z0-9_]+):(\d+)>/g;
            let tocHTML = '';

            // 3. Agrupar mensagens pelo cabeçalho (# ou ##)
            const groupedData = [];
            let currentGroup = null;

            sortedData.forEach(msg => {
                // Verifica se a mensagem atual contém um título principal (# ou ##)
                const hasHeading = /^(#{1,2})\s+(.*)$/m.test(msg.content || "");
                
                if (hasHeading || !currentGroup) {
                    currentGroup = {
                        messages: [msg] // Salva as mensagens originais na ordem
                    };
                    groupedData.push(currentGroup);
                } else {
                    currentGroup.messages.push(msg);
                }
            });

            // 4. Renderizar o HTML dos Grupos e Montar o Índice
            groupedData.forEach((group) => {
                // Removemos os avatares e fundo de "cartão", mantendo um layout fluido de página
                const article = document.createElement('article');
                article.className = 'mb-12 relative';

                let bodyHTML = '';

                // Renderiza cada mensagem individualmente dentro do mesmo capítulo
                group.messages.forEach((msg, index) => {
                    let rawContent = msg.content || "";
                    let headingsHTML = '';
                    
                    // Separar Títulos e Textos
                    const lines = rawContent.split('\n');
                    let remainingLines = [];

                    lines.forEach(line => {
                        const match = line.match(/^(#{1,2})\s+(.*)$/); 
                        if (match) {
                            const level = match[1].length; 
                            let rawText = match[2];
                            const slug = createSlug(rawText);
                            
                            // Limpa ** do texto base
                            let cleanText = rawText.replace(/\*\*/g, '');
                            
                            // Título para o Menu
                            let tocText = cleanText.replace(discordEmojiRegex, '<img src="https://cdn.discordapp.com/emojis/$2.png" class="inline-block w-4 h-4 mr-1 align-middle">');
                            
                            // Título Gigante pra visualização real na tela
                            let displayText = cleanText.replace(discordEmojiRegex, '<img src="https://cdn.discordapp.com/emojis/$2.png" class="inline-block h-8 w-8 mx-2 align-middle">');
                            
                            // Criação dos botões do índice e injeção do Título formatado fora do Parse Markdown
                            if (level === 1) {
                                tocHTML += `<li class="pt-3 pb-1"><a href="#${slug}" class="block text-blue-200 font-bold hover:text-blue-400 transition-colors text-sm" onclick="if(window.innerWidth < 768) toggleMenu()">${tocText}</a></li>`;
                                headingsHTML += `<h1 id="${slug}" class="text-3xl md:text-4xl font-extrabold text-white mt-12 mb-6 border-b-2 border-blue-500/50 pb-4 flex items-center scroll-mt-24 tracking-tight">${displayText}</h1>`;
                            } else if (level === 2) {
                                tocHTML += `<li class="ml-3 border-l-2 border-slate-700/50 pl-3 py-1"><a href="#${slug}" class="block text-slate-400 text-sm hover:text-blue-300 transition-colors" onclick="if(window.innerWidth < 768) toggleMenu()">${tocText}</a></li>`;
                                headingsHTML += `<h2 id="${slug}" class="text-2xl md:text-3xl font-bold text-blue-100 mt-10 mb-5 scroll-mt-24 flex items-center tracking-tight">${displayText}</h2>`;
                            }
                        } else {
                            // Se não for título, mantem como texto normal
                            remainingLines.push(line);
                        }
                    });

                    // Parse do que não era título
                    rawContent = remainingLines.join('\n').trim();
                    rawContent = rawContent.replace(discordEmojiRegex, '<img src="https://cdn.discordapp.com/emojis/$2.png" alt=":$1:" class="inline-block h-6 w-6 align-middle">');
                    let htmlContent = rawContent ? marked.parse(rawContent) : '';

                    // Verificar se existe mídia nesta mensagem específica
                    const hasMedia = (msg.attachments && msg.attachments.length > 0) || (msg.embeds && msg.embeds.length > 0);

                    // 1º Insere os Títulos Isolados (se houver)
                    if (headingsHTML) {
                        bodyHTML += headingsHTML;
                    }

                    // 2º Insere o Conteúdo (Mídia com Legenda VS Apenas Texto)
                    if (htmlContent || hasMedia) {
                        if (hasMedia) {
                            // Caixa Unificada de Mídia + Legenda
                            let mediaBoxContent = '';
                            
                            // Legenda vinculada à mídia
                            if (htmlContent) {
                                mediaBoxContent += `<div class="p-5 md:p-6 pb-2 prose max-w-none media-caption">${htmlContent}</div>`;
                            }
                            
                            // Anexos (Imagens)
                            if (msg.attachments && msg.attachments.length > 0) {
                                mediaBoxContent += '<div class="px-5 md:px-6 pb-5 md:pb-6 flex flex-col gap-4">';
                                msg.attachments.forEach(att => {
                                    if (att.content_type && att.content_type.startsWith('image/')) {
                                        mediaBoxContent += `<img src="${att.url}" alt="${att.filename}" class="w-full h-auto rounded-xl shadow-lg border border-slate-700/50 object-contain max-h-[600px]" loading="lazy">`;
                                    }
                                });
                                mediaBoxContent += '</div>';
                            }

                            // Embeds (Vídeos do YouTube)
                            if (msg.embeds && msg.embeds.length > 0) {
                                mediaBoxContent += '<div class="px-5 md:px-6 pb-5 md:pb-6 flex flex-col gap-4">';
                                msg.embeds.forEach(embed => {
                                    if (embed.type === 'video' && embed.video && embed.video.url) {
                                        mediaBoxContent += `
                                            <div class="relative w-full pb-[56.25%] h-0 rounded-xl overflow-hidden shadow-lg border border-slate-700/50">
                                                <iframe src="${embed.video.url}" class="absolute top-0 left-0 w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                            </div>
                                            ${embed.title ? `<p class="mt-3 text-sm text-slate-400 font-semibold text-center">${embed.title}</p>` : ''}
                                        `;
                                    }
                                });
                                mediaBoxContent += '</div>';
                            }

                            // Renderiza a Caixa Escura Unida
                            bodyHTML += `
                                <div class="msg-block mb-8">
                                    <div class="bg-slate-800/60 backdrop-blur-sm rounded-2xl overflow-hidden shadow-md border border-slate-700/60 max-w-full lg:max-w-4xl mx-auto">
                                        ${mediaBoxContent}
                                    </div>
                                </div>
                            `;
                        } else {
                            // Parágrafos soltos, fluindo normalmente fora da caixa
                            bodyHTML += `
                                <div class="msg-block mb-6">
                                    <div class="prose max-w-none text-slate-300">${htmlContent}</div>
                                </div>
                            `;
                        }
                    }
                });

                // Insere no Layout
                article.innerHTML = bodyHTML;
                contentContainer.appendChild(article);
            });

            // Atualizar o container do índice
            tocList.innerHTML = tocHTML;
        }

        // Inicia
        fetchDados();
    </script>
</body>
</html>
